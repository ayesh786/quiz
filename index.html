<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body{
    background-color: rgb(33, 96, 107);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container{
    width: 450px;
    background-color: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h1{
    margin-bottom: 15px;
    color: #333;
}

.timer{
    display: inline-block;
    background-color: #972020;
    color: white;
    padding: 8px 15px;
    border-radius: 20px;
    font-weight: bold;
    margin-bottom: 20px;
}

.quiz-box{
    text-align: left;
}

#questions{
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 20px;
    text-align: center;
    color: #222;
}

 .option-box{
    margin-bottom: 20px;
}

.option-box input{
    margin-right: 10px;
    cursor: pointer;
}

.option-box label{
    display: inline-block;
    margin: 8px 0;
    cursor: pointer;
    font-size: 16px;
    color: #333;
}

.option-box label:hover{
    color: #007bff;
} 

#nextBtn{
    width: 100%;
    padding: 10px;
    background-color: #2f578d;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

#nextBtn:hover{
    background-color: #050358;
}
    </style>
</head>
<body>
  <div class="container">

  <h1>Quiz Application</h1>

  <div class="timer">
    Time Left: <span id="time">30</span>s
  </div>

  <div class="quiz-box">

    <p id="ques"></p><br>

    <input type="radio" name="option" id="option1">
    <label id="label1" for="option1"></label><br>

    <input type="radio" name="option" id="option2">
    <label id="label2" for="option2"></label><br>

    <input type="radio" name="option" id="option3">
    <label id="label3" for="option3"></label><br><br>

    <button id="nextBtn">Next</button>

  </div>

</div>




    <script src="app.js"></script>
</body>
</html>
